<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>UnMeet Settings</title>
  <style>
    :root {
      --bg: #090A0E;
      --surface: #111318;
      --border: #1E2028;
      --text: #B0B3BD;
      --text-dim: #5C5F6B;
      --accent: #3B82F6;
      --red: #EF4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      font-size: 14px;
      max-width: 480px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    h1 { color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 24px; }
    h1 span { color: var(--accent); }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .section label {
      display: block;
      color: var(--text-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .section input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .section input:focus { border-color: var(--accent); }
    .hint { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

    .actions {
      display: flex; gap: 10px; margin-top: 24px;
    }
    button {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2563EB; }
    .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }

    .saved { color: #10B981; font-size: 12px; margin-left: 12px; opacity: 0; transition: opacity 0.3s; }
    .saved.show { opacity: 1; }

    .export-section { margin-top: 32px; }
    .export-section h2 { color: #fff; font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .export-section p { color: var(--text-dim); font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h1>Un<span>Meet</span> Settings</h1>

  <div class="section">
    <label>Your hourly rate (USD)</label>
    <input type="number" id="hourly-rate" placeholder="75" min="1" max="1000">
    <div class="hint">Used to calculate meeting cost. Be honest — or aspirational.</div>
  </div>

  <div class="section">
    <label>Currency symbol</label>
    <input type="text" id="currency" placeholder="$" maxlength="3">
    <div class="hint">$ / € / £ / ¥</div>
  </div>

  <div style="display:flex;align-items:center;gap:12px;">
    <button class="btn-primary" id="save-btn">Save</button>
    <span class="saved" id="saved-msg">✓ Saved</span>
  </div>

  <div class="export-section">
    <h2>Data</h2>
    <p>All meeting data is stored locally in your browser. You can export or delete it at any time.</p>
    <div class="actions">
      <button class="btn-primary" id="export-btn">Export JSON</button>
      <button class="btn-danger" id="clear-btn">Clear all data</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
