<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#090A0E"/>
  <rect width="128" height="128" rx="24" fill="none" stroke="#1E2028" stroke-width="1.5"/>
  <!-- Clock face -->
  <circle cx="64" cy="56" r="36" fill="none" stroke="#3B82F6" stroke-width="3"/>
  <!-- Clock hands showing 10:10 -->
  <line x1="64" y1="56" x2="64" y2="32" stroke="#B0B3BD" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="56" x2="80" y2="56" stroke="#B0B3BD" stroke-width="2.5" stroke-linecap="round"/>
  <!-- X mark overlay -->
  <line x1="32" y1="80" x2="96" y2="104" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
  <line x1="96" y1="80" x2="32" y2="104" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
</svg>
